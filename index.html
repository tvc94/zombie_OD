<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Otto Diva Zombie Hunt</title>
  <style>
    :root {
      --ink: #f6f3df;
      --panel: #171717;
      --panel-2: #252525;
      --line: #4f4a3a;
      --gold: #f2c14e;
      --mint: #5bffb8;
      --red: #f04f4f;
      --blue: #55aaff;
      --ground: #253225;
      --gothic: "UnifrakturCook", "UnifrakturMaguntia", "Old English Text MT", "Cloister Black", "Blackletter", Georgia, "Times New Roman", serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #0d0d0d;
      color: var(--ink);
      font-family: "Courier New", Courier, monospace;
    }

    body {
      display: grid;
      align-items: start;
      justify-items: center;
      padding: 18px;
      overflow-x: hidden;
      overscroll-behavior: none;
    }

    button {
      font: inherit;
      color: inherit;
      cursor: pointer;
    }

    .shell {
      width: min(1100px, 100%);
      display: grid;
      gap: 12px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      color: #e5dec0;
      text-transform: uppercase;
      text-shadow: 2px 2px #000;
    }

    h1 {
      margin: 0;
      font-family: var(--gothic);
      font-size: clamp(1.45rem, 2.9vw, 2.45rem);
      font-weight: 900;
      letter-spacing: 0.5px;
      color: #f6e6b8;
      text-transform: none;
      text-shadow:
        2px 2px 0 #000,
        3px 3px 0 #3a0710,
        -1px 0 0 #000,
        0 0 10px rgba(242, 193, 78, 0.32);
    }

    .hud {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      font-size: 0.95rem;
    }

    .pill {
      min-width: 92px;
      padding: 7px 10px;
      border: 3px solid var(--line);
      background: var(--panel);
      box-shadow: 4px 4px 0 #000;
      text-align: center;
    }

    .stage {
      position: relative;
      border: 5px solid var(--line);
      background: #101010;
      box-shadow: 8px 8px 0 #000;
      image-rendering: pixelated;
      overflow: hidden;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #182018;
      image-rendering: pixelated;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        linear-gradient(rgba(13, 13, 13, 0.78), rgba(13, 13, 13, 0.9)),
        repeating-linear-gradient(0deg, transparent 0 4px, rgba(255, 255, 255, 0.04) 4px 5px);
    }

    .overlay.hidden {
      display: none;
    }

    .menu {
      width: min(720px, 100%);
      padding: 18px;
      border: 4px solid var(--line);
      background: var(--panel);
      box-shadow: 7px 7px 0 #000;
    }

    .menu h2 {
      margin: 0 0 14px;
      font-family: var(--gothic);
      color: var(--gold);
      font-size: clamp(1.25rem, 2.3vw, 1.85rem);
      font-weight: 900;
      letter-spacing: 0.4px;
      text-transform: none;
      text-align: center;
      text-shadow:
        2px 2px 0 #000,
        3px 3px 0 #3a0710;
    }

    .characters {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .character {
      display: grid;
      gap: 8px;
      justify-items: center;
      min-height: 170px;
      padding: 12px;
      border: 4px solid #3d3d3d;
      background: var(--panel-2);
      box-shadow: inset -4px -4px 0 rgba(0, 0, 0, 0.35);
    }

    .character[aria-pressed="true"] {
      border-color: var(--gold);
      color: var(--gold);
    }

    .sprite-preview {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      transform: scale(1.2);
      transform-origin: center;
    }

    .name {
      font-family: var(--gothic);
      font-size: 1.1rem;
      font-weight: 900;
      text-transform: none;
      text-shadow: 2px 2px 0 #000;
    }

    .stats {
      color: #d5cda9;
      font-size: 0.85rem;
      line-height: 1.35;
      text-align: center;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action {
      min-width: 160px;
      padding: 12px 14px;
      border: 4px solid var(--line);
      background: #2e4a33;
      box-shadow: 5px 5px 0 #000;
      font-family: var(--gothic);
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: 0.3px;
      text-transform: none;
      text-shadow: 2px 2px 0 #000;
    }

    .action:hover,
    .character:hover {
      transform: translate(-1px, -1px);
    }

    .secondary {
      background: #343434;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      font-size: 0.85rem;
      color: #d5cda9;
      text-transform: uppercase;
    }

    .key {
      padding: 8px;
      border: 3px solid #383426;
      background: #181818;
      text-align: center;
      min-height: 40px;
      font-weight: 900;
      text-transform: uppercase;
      text-shadow: 1px 1px 0 #000;
    }

    .touch-controls {
      position: absolute;
      inset: auto 0 0;
      display: none;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      padding: 14px;
      pointer-events: none;
      z-index: 3;
    }

    .stick,
    .fire-touch {
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .stick {
      position: relative;
      width: 104px;
      height: 104px;
      border: 4px solid rgba(242, 193, 78, 0.65);
      background: rgba(12, 18, 12, 0.58);
      box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.55);
    }

    .stick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 42px;
      height: 42px;
      transform: translate(-50%, -50%);
      border: 3px solid #d5cda9;
      background: rgba(242, 193, 78, 0.78);
      box-shadow: 3px 3px 0 #000;
    }

    .fire-touch {
      width: 88px;
      height: 88px;
      border: 4px solid rgba(240, 79, 79, 0.8);
      background: rgba(80, 16, 22, 0.72);
      box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.55);
      color: #fff2d0;
      font-size: 1.08rem;
      font-weight: 900;
      text-transform: uppercase;
      text-shadow: 2px 2px 0 #000;
      display: grid;
      place-items: center;
    }

    @media (max-width: 700px), (hover: none) and (pointer: coarse) {
      body {
        padding: 10px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .hud {
        justify-content: stretch;
      }

      .pill {
        flex: 1 1 46%;
      }

      .characters,
      .controls {
        grid-template-columns: 1fr;
      }

      .menu {
        padding: 12px;
      }

      .touch-controls {
        display: flex;
      }

      .overlay:not(.hidden) ~ .touch-controls {
        display: none;
      }

      .stage {
        border-width: 3px;
        box-shadow: 5px 5px 0 #000;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <h1>Otto Diva Zombie Hunt</h1>
      <div class="hud" aria-live="polite">
        <div class="pill">Vie <span id="health">100</span></div>
        <div class="pill">Score <span id="score">0</span></div>
        <div class="pill">Vague <span id="wave">1</span></div>
        <div class="pill">Munitions <span id="ammo">∞</span></div>
      </div>
    </header>

    <section class="stage" aria-label="Zone de jeu">
      <canvas id="game" width="960" height="540"></canvas>
      <div id="overlay" class="overlay">
        <div class="menu">
          <h2 id="menuTitle">Choisis ton survivant</h2>
          <div class="characters">
            <button class="character" type="button" data-hero="brick" aria-pressed="true">
              <span class="sprite-preview" id="brickPreview"></span>
              <span class="name">Otto</span>
              <span class="stats">Synthé spectral<br>Tir puissant</span>
            </button>
            <button class="character" type="button" data-hero="nova" aria-pressed="false">
              <span class="sprite-preview" id="novaPreview"></span>
              <span class="name">Diva</span>
              <span class="stats">Micro hurlant<br>Double tir léger</span>
            </button>
          </div>
          <div class="actions">
            <button id="startBtn" class="action" type="button">Jouer</button>
            <button id="restartBtn" class="action secondary" type="button">Recommencer</button>
            <button id="musicBtn" class="action secondary" type="button" aria-pressed="true">Musique ON</button>
          </div>
        </div>
      </div>
      <div class="touch-controls" aria-label="Contrôles tactiles">
        <div id="stick" class="stick" role="application" aria-label="Déplacement tactile">
          <div id="stickKnob" class="stick-knob"></div>
        </div>
        <button id="fireTouch" class="fire-touch" type="button" aria-label="Tirer">Tir</button>
      </div>
    </section>

    <nav class="controls" aria-label="Contrôles">
      <div class="key">Stick / WASD</div>
      <div class="key">Visée auto</div>
      <div class="key">Bouton Tir / espace</div>
      <div class="key">P pause</div>
    </nav>
  </main>

  <script>
    if ("scrollRestoration" in history) history.scrollRestoration = "manual";
    window.scrollTo(0, 0);
    window.addEventListener("load", () => {
      setTimeout(() => window.scrollTo(0, 0), 0);
    });

    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    const overlay = document.querySelector("#overlay");
    const menuTitle = document.querySelector("#menuTitle");
    const startBtn = document.querySelector("#startBtn");
    const restartBtn = document.querySelector("#restartBtn");
    const musicBtn = document.querySelector("#musicBtn");
    const stick = document.querySelector("#stick");
    const stickKnob = document.querySelector("#stickKnob");
    const fireTouch = document.querySelector("#fireTouch");
    const heroButtons = [...document.querySelectorAll(".character")];
    const ui = {
      health: document.querySelector("#health"),
      score: document.querySelector("#score"),
      wave: document.querySelector("#wave"),
      ammo: document.querySelector("#ammo")
    };

    const heroes = {
      nova: {
        name: "Diva",
        color: "#b70f24",
        trim: "#f04f4f",
        skin: "#e5ad86",
        hair: "#111111",
        outfit: "red",
        weapon: "mic",
        speed: 220,
        health: 100,
        fireRate: 0.16,
        bulletSpeed: 560,
        bulletDamage: 22,
        spread: 0.12,
        pelletCount: 2
      },
      brick: {
        name: "Otto",
        color: "#f4f0e8",
        trim: "#d8d2bd",
        skin: "#d8ad86",
        hair: "#191512",
        outfit: "white",
        weapon: "synth",
        speed: 168,
        health: 135,
        fireRate: 0.27,
        bulletSpeed: 500,
        bulletDamage: 42,
        spread: 0,
        pelletCount: 1
      }
    };

    const keys = new Set();
    const mouse = { x: canvas.width / 2, y: canvas.height / 2, down: false };
    const touchMove = { id: null, x: 0, y: 0 };
    const touchFire = { down: false };
    const music = new Audio("otto-diva-jill-valentine.mp3");
    music.volume = 0.45;
    music.preload = "auto";
    let musicEnabled = true;
    const state = {
      selectedHero: "brick",
      running: false,
      paused: false,
      gameOver: false,
      score: 0,
      wave: 1,
      spawnTimer: 0,
      spawnDelay: 1.2,
      zombiesToSpawn: 0,
      lastTime: 0,
      player: null,
      bullets: [],
      zombies: [],
      particles: [],
      pickups: []
    };

    function updateMusicButton() {
      musicBtn.textContent = musicEnabled ? "Musique ON" : "Musique OFF";
      musicBtn.setAttribute("aria-pressed", String(musicEnabled));
    }

    function startMusic() {
      if (!musicEnabled) return;
      if (music.currentTime >= 30) music.currentTime = 0;
      music.play().catch(() => {});
    }

    music.addEventListener("timeupdate", () => {
      if (music.currentTime < 30) return;
      music.currentTime = 0;
      if (musicEnabled && state.running && !state.gameOver) music.play().catch(() => {});
    });

    window.addEventListener("scroll", () => {
      if (state.running) requestAnimationFrame(() => window.scrollTo(0, 0));
    }, { passive: true });

    function nearestZombie() {
      if (!state.player || state.zombies.length === 0) return null;
      let nearest = null;
      let nearestDistance = Infinity;
      state.zombies.forEach((zombie) => {
        const distance = Math.hypot(zombie.x - state.player.x, zombie.y - state.player.y);
        if (distance < nearestDistance) {
          nearestDistance = distance;
          nearest = zombie;
        }
      });
      return nearest;
    }

    function aimAngle() {
      const player = state.player;
      if (!player) return 0;
      if (mouse.down) return Math.atan2(mouse.y - player.y, mouse.x - player.x);
      const target = nearestZombie();
      if (target) return Math.atan2(target.y - player.y, target.x - player.x);
      return player.aim || Math.atan2(mouse.y - player.y, mouse.x - player.x);
    }

    function resetGame() {
      const hero = heroes[state.selectedHero];
      state.running = true;
      state.paused = false;
      state.gameOver = false;
      state.score = 0;
      state.wave = 1;
      state.spawnTimer = 1.0;
      state.spawnDelay = 0.95;
      state.zombiesToSpawn = 8;
      state.bullets = [];
      state.zombies = [];
      state.particles = [];
      state.pickups = [];
      state.player = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        radius: 15,
        aim: 0,
        health: hero.health,
        maxHealth: hero.health,
        cooldown: 0,
        invulnerable: 1.0,
        hero
      };
      if (document.activeElement instanceof HTMLElement) document.activeElement.blur();
      overlay.classList.add("hidden");
      requestAnimationFrame(() => window.scrollTo(0, 0));
      setTimeout(() => window.scrollTo(0, 0), 80);
      updateHud();
    }

    function updateHud() {
      ui.health.textContent = Math.max(0, Math.ceil(state.player?.health ?? heroes[state.selectedHero].health));
      ui.score.textContent = state.score;
      ui.wave.textContent = state.wave;
      ui.ammo.textContent = "∞";
    }

    function selectHero(heroId) {
      state.selectedHero = heroId;
      heroButtons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.hero === heroId));
      });
      draw();
    }

    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: (event.clientX - rect.left) * scaleX,
        y: (event.clientY - rect.top) * scaleY
      };
    }

    function shoot() {
      if (!state.running || state.paused || state.gameOver || !state.player) return;
      const player = state.player;
      if (player.cooldown > 0) return;

      const hero = player.hero;
      player.cooldown = hero.fireRate;
      const base = aimAngle();
      player.aim = base;
      const startOffset = hero.pelletCount === 1 ? [0] : [-hero.spread, hero.spread];

      startOffset.forEach((offset) => {
        const angle = base + offset;
        state.bullets.push({
          x: player.x + Math.cos(angle) * 20,
          y: player.y + Math.sin(angle) * 20,
          vx: Math.cos(angle) * hero.bulletSpeed,
          vy: Math.sin(angle) * hero.bulletSpeed,
          radius: 4,
          damage: hero.bulletDamage,
          life: 0.85,
          color: hero.trim,
          weapon: hero.weapon
        });
      });

      addParticles(player.x + Math.cos(base) * 21, player.y + Math.sin(base) * 21, hero.trim, 5, 80);
    }

    function spawnZombie() {
      const side = Math.floor(Math.random() * 4);
      const margin = 34;
      let x = 0;
      let y = 0;
      if (side === 0) {
        x = Math.random() * canvas.width;
        y = -margin;
      } else if (side === 1) {
        x = canvas.width + margin;
        y = Math.random() * canvas.height;
      } else if (side === 2) {
        x = Math.random() * canvas.width;
        y = canvas.height + margin;
      } else {
        x = -margin;
        y = Math.random() * canvas.height;
      }

      const fast = Math.random() < Math.min(0.3, state.wave * 0.035);
      const bulky = state.wave > 2 && Math.random() < 0.18;
      const hp = bulky ? 120 + state.wave * 10 : 54 + state.wave * 8;
      state.zombies.push({
        x,
        y,
        radius: bulky ? 18 : 14,
        speed: (fast ? 86 : 46) + state.wave * 3,
        health: hp,
        maxHealth: hp,
        damage: bulky ? 16 : 8,
        attackTimer: 0,
        color: fast ? "#b7cdbd" : bulky ? "#6f7466" : "#91a28d",
        face: fast ? "#d8decf" : "#bfc7b6",
        coat: bulky ? "#342d2f" : "#3a3437",
        eye: fast ? "#ff3b6b" : "#d9274e"
      });
    }

    function nextWave() {
      state.wave += 1;
      state.zombiesToSpawn = 7 + state.wave * 4;
      state.spawnDelay = Math.max(0.28, 1.0 - state.wave * 0.055);
      addParticles(canvas.width / 2, canvas.height / 2, "#f2c14e", 45, 130);
    }

    function addParticles(x, y, color, count, speed) {
      for (let i = 0; i < count; i += 1) {
        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * speed + 20;
        state.particles.push({
          x,
          y,
          vx: Math.cos(angle) * velocity,
          vy: Math.sin(angle) * velocity,
          life: 0.25 + Math.random() * 0.35,
          maxLife: 0.6,
          color,
          size: 2 + Math.random() * 4
        });
      }
    }

    function update(dt) {
      if (!state.running || state.paused || state.gameOver) return;
      const player = state.player;
      const hero = player.hero;
      let dx = 0;
      let dy = 0;

      if (keys.has("w") || keys.has("arrowup")) dy -= 1;
      if (keys.has("s") || keys.has("arrowdown")) dy += 1;
      if (keys.has("a") || keys.has("arrowleft")) dx -= 1;
      if (keys.has("d") || keys.has("arrowright")) dx += 1;
      dx += touchMove.x;
      dy += touchMove.y;
      if (dx || dy) {
        const length = Math.hypot(dx, dy);
        player.x += (dx / length) * hero.speed * dt;
        player.y += (dy / length) * hero.speed * dt;
      }

      player.x = Math.max(24, Math.min(canvas.width - 24, player.x));
      player.y = Math.max(38, Math.min(canvas.height - 24, player.y));
      player.aim = aimAngle();
      player.cooldown = Math.max(0, player.cooldown - dt);
      player.invulnerable = Math.max(0, player.invulnerable - dt);

      if (mouse.down || touchFire.down || keys.has(" ")) shoot();

      state.spawnTimer -= dt;
      if (state.zombiesToSpawn > 0 && state.spawnTimer <= 0) {
        spawnZombie();
        state.zombiesToSpawn -= 1;
        state.spawnTimer = state.spawnDelay;
      }
      if (state.zombiesToSpawn <= 0 && state.zombies.length === 0) nextWave();

      state.bullets.forEach((bullet) => {
        bullet.x += bullet.vx * dt;
        bullet.y += bullet.vy * dt;
        bullet.life -= dt;
      });

      state.zombies.forEach((zombie) => {
        const angle = Math.atan2(player.y - zombie.y, player.x - zombie.x);
        zombie.x += Math.cos(angle) * zombie.speed * dt;
        zombie.y += Math.sin(angle) * zombie.speed * dt;
        zombie.attackTimer = Math.max(0, zombie.attackTimer - dt);

        const distance = Math.hypot(player.x - zombie.x, player.y - zombie.y);
        if (distance < player.radius + zombie.radius && zombie.attackTimer <= 0 && player.invulnerable <= 0) {
          player.health -= zombie.damage;
          zombie.attackTimer = 0.55;
          player.invulnerable = 0.22;
          addParticles(player.x, player.y, "#f04f4f", 12, 90);
          if (player.health <= 0) endGame();
        }
      });

      for (const bullet of state.bullets) {
        for (const zombie of state.zombies) {
          if (bullet.life <= 0 || zombie.health <= 0) continue;
          const distance = Math.hypot(bullet.x - zombie.x, bullet.y - zombie.y);
          if (distance < bullet.radius + zombie.radius) {
            bullet.life = 0;
            zombie.health -= bullet.damage;
            addParticles(bullet.x, bullet.y, "#a6ff75", 7, 70);
            if (zombie.health <= 0) {
              state.score += 10 + state.wave;
              addParticles(zombie.x, zombie.y, zombie.color, 18, 120);
              if (Math.random() < 0.08) {
                state.pickups.push({ x: zombie.x, y: zombie.y, radius: 10, life: 8 });
              }
            }
          }
        }
      }

      state.pickups.forEach((pickup) => {
        pickup.life -= dt;
        if (Math.hypot(player.x - pickup.x, player.y - pickup.y) < player.radius + pickup.radius) {
          player.health = Math.min(player.maxHealth, player.health + 18);
          pickup.life = 0;
          addParticles(pickup.x, pickup.y, "#5bffb8", 14, 80);
        }
      });

      state.particles.forEach((particle) => {
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;
        particle.vx *= 0.9;
        particle.vy *= 0.9;
        particle.life -= dt;
      });

      state.bullets = state.bullets.filter((bullet) =>
        bullet.life > 0 &&
        bullet.x > -40 &&
        bullet.x < canvas.width + 40 &&
        bullet.y > -40 &&
        bullet.y < canvas.height + 40
      );
      state.zombies = state.zombies.filter((zombie) => zombie.health > 0);
      state.particles = state.particles.filter((particle) => particle.life > 0);
      state.pickups = state.pickups.filter((pickup) => pickup.life > 0);
      updateHud();
    }

    function endGame() {
      state.gameOver = true;
      state.running = false;
      menuTitle.textContent = `Partie finie - score ${state.score}`;
      overlay.classList.remove("hidden");
    }

    function drawBackground() {
      ctx.fillStyle = "#101810";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#172616";
      for (let y = 0; y < canvas.height; y += 48) {
        for (let x = 0; x < canvas.width; x += 48) {
          if ((x / 48 + y / 48) % 2 === 0) ctx.fillRect(x, y, 48, 48);
        }
      }

      ctx.fillStyle = "#0c140d";
      for (let y = 32; y < canvas.height; y += 96) {
        ctx.fillRect(0, y, canvas.width, 14);
      }

      const trees = [
        [44, 18, 34, 180], [150, 310, 38, 210], [265, 58, 28, 145],
        [520, 332, 42, 180], [658, 30, 36, 160], [850, 260, 34, 220],
        [910, 70, 28, 150], [365, 405, 30, 135]
      ];
      trees.forEach(([x, y, w, h], index) => {
        ctx.fillStyle = index % 2 ? "#3a2c1f" : "#4a3422";
        ctx.fillRect(x, y, w, h);
        ctx.fillStyle = "#142414";
        ctx.fillRect(x - 25, y - 18, w + 50, 34);
        ctx.fillStyle = "#1d351b";
        ctx.fillRect(x - 36, y + 12, w + 72, 28);
        ctx.fillStyle = "#0e1f10";
        ctx.fillRect(x - 18, y + 46, w + 36, 22);
      });

      ctx.fillStyle = "#20391b";
      for (let x = 0; x < canvas.width; x += 38) {
        const h = 12 + ((x * 7) % 18);
        ctx.fillRect(x, canvas.height - h, 18, h);
        ctx.fillRect(x + 12, canvas.height - h - 10, 12, 10);
      }

      ctx.fillStyle = "rgba(145, 178, 174, 0.10)";
      ctx.fillRect(0, 92, canvas.width, 18);
      ctx.fillRect(0, 238, canvas.width, 14);
      ctx.fillRect(0, 430, canvas.width, 20);

      ctx.fillStyle = "#2b3528";
      ctx.fillRect(90, 92, 88, 28);
      ctx.fillRect(712, 390, 116, 28);
      ctx.fillRect(410, 150, 30, 96);
      ctx.fillStyle = "#121812";
      ctx.fillRect(96, 98, 76, 16);
      ctx.fillRect(718, 396, 104, 16);
      ctx.fillRect(416, 156, 18, 84);
    }

    function pixelRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
    }

    function drawWeapon(hero) {
      if (hero.weapon === "mic") {
        pixelRect(10, -1, 7, 3, "#3b1b22");
        pixelRect(14, -3, 19, 6, "#191919");
        pixelRect(29, -7, 9, 12, "#d8d2bd");
        pixelRect(31, -5, 5, 8, "#4a4a4a");
        pixelRect(33, -9, 4, 2, "#f4f0e8");
        pixelRect(20, 4, 4, 9, hero.trim);
        pixelRect(16, 8, 12, 3, "rgba(240, 79, 79, 0.55)");
        return;
      }

      pixelRect(7, -11, 38, 22, "#0a0a0a");
      pixelRect(10, -9, 32, 18, "#121212");
      pixelRect(13, -6, 26, 12, "#e8e1d4");
      for (let x = 15; x < 37; x += 5) {
        pixelRect(x, -5, 2, 10, "#151515");
      }
      pixelRect(13, -9, 9, 3, "#5d6b78");
      pixelRect(31, -9, 8, 3, "#8f4fff");
      pixelRect(40, -4, 6, 8, hero.trim);
      pixelRect(17, 9, 20, 3, "rgba(216, 210, 189, 0.55)");
    }

    function drawHeroSprite(x, y, hero, angle, blink) {
      ctx.save();
      ctx.translate(Math.round(x), Math.round(y));
      pixelRect(-18, 31, 36, 5, "rgba(0, 0, 0, 0.45)");
      if (!blink) {
        if (hero.outfit === "red") {
          pixelRect(-11, -31, 22, 8, "#070707");
          pixelRect(-13, -24, 26, 7, "#070707");
          pixelRect(-10, -24, 20, 17, hero.skin);
          pixelRect(-10, -17, 20, 5, "#070707");
          pixelRect(-4, -18, 3, 3, "#101010");
          pixelRect(5, -18, 3, 3, "#101010");
          pixelRect(-4, -11, 9, 3, "#2a0810");
          pixelRect(-9, -6, 18, 6, hero.color);
          pixelRect(-11, 0, 22, 6, hero.color);
          pixelRect(-9, 6, 18, 8, hero.color);
          pixelRect(-6, 0, 12, 14, "#f1a0a0");
          pixelRect(-3, 5, 6, 6, "#74121b");
          pixelRect(-16, -3, 5, 9, hero.color);
          pixelRect(-19, 6, 4, 9, hero.color);
          pixelRect(-22, 16, 8, 4, hero.skin);
          pixelRect(11, -3, 5, 9, hero.color);
          pixelRect(15, 6, 4, 9, hero.color);
          pixelRect(16, 16, 8, 4, hero.skin);
          pixelRect(-8, 15, 16, 4, "#111111");
          pixelRect(-11, 19, 6, 9, "#111111");
          pixelRect(5, 19, 6, 9, "#111111");
          pixelRect(-13, 28, 5, 8, "#111111");
          pixelRect(8, 28, 5, 8, "#111111");
          pixelRect(-17, 35, 9, 4, "#050505");
          pixelRect(8, 35, 9, 4, "#050505");
        } else {
          pixelRect(-17, -24, 5, 26, hero.hair);
          pixelRect(12, -24, 5, 29, hero.hair);
          pixelRect(-14, -19, 4, 35, "#0b0b0b");
          pixelRect(10, -18, 4, 37, "#0b0b0b");
          pixelRect(-13, -31, 26, 9, hero.hair);
          pixelRect(-15, -23, 30, 8, hero.hair);
          pixelRect(-10, -24, 20, 17, hero.skin);
          pixelRect(-8, -21, 8, 7, "#050505");
          pixelRect(2, -21, 8, 7, "#050505");
          pixelRect(0, -19, 2, 2, "#050505");
          pixelRect(-6, -14, 13, 8, "#3b241c");
          pixelRect(-4, -12, 9, 4, "#5a3528");
          pixelRect(-10, -6, 20, 7, hero.color);
          pixelRect(-11, 1, 22, 7, hero.color);
          pixelRect(-8, 8, 17, 11, hero.color);
          pixelRect(0, -6, 9, 27, "#eee8dd");
          pixelRect(5, 5, 6, 17, "#fffaf0");
          pixelRect(-17, -3, 5, 10, hero.color);
          pixelRect(-20, 7, 4, 10, hero.color);
          pixelRect(-23, 17, 8, 4, hero.skin);
          pixelRect(12, -3, 5, 10, hero.color);
          pixelRect(16, 7, 4, 10, hero.color);
          pixelRect(16, 17, 8, 4, hero.skin);
          pixelRect(-9, 20, 18, 4, "#111111");
          pixelRect(-12, 24, 6, 10, "#111111");
          pixelRect(6, 24, 6, 10, "#111111");
          pixelRect(-15, 34, 5, 6, "#111111");
          pixelRect(9, 34, 5, 6, "#111111");
          pixelRect(-19, 39, 9, 4, "#050505");
          pixelRect(9, 39, 9, 4, "#050505");
          pixelRect(11, 0, 13, 5, "#111111");
        }
      }
      ctx.rotate(angle);
      drawWeapon(hero);
      ctx.restore();
    }

    function drawZombie(zombie) {
      pixelRect(zombie.x - 16, zombie.y + 31, 32, 5, "rgba(0, 0, 0, 0.45)");
      pixelRect(zombie.x - 9, zombie.y - 28, 18, 6, "#d9dfd2");
      pixelRect(zombie.x - 12, zombie.y - 23, 20, 12, zombie.face);
      pixelRect(zombie.x - 9, zombie.y - 14, 17, 6, "#9ca894");
      pixelRect(zombie.x - 6, zombie.y - 20, 4, 3, zombie.eye);
      pixelRect(zombie.x + 3, zombie.y - 19, 4, 3, zombie.eye);
      pixelRect(zombie.x - 5, zombie.y - 13, 8, 2, "#2a2224");
      pixelRect(zombie.x - 16, zombie.y - 8, 25, 9, zombie.coat);
      pixelRect(zombie.x - 13, zombie.y + 1, 23, 10, zombie.color);
      pixelRect(zombie.x - 9, zombie.y + 11, 16, 8, zombie.coat);
      pixelRect(zombie.x - 17, zombie.y + 2, 5, 10, "#201b1f");
      pixelRect(zombie.x + 7, zombie.y + 4, 6, 8, "#56464b");
      pixelRect(zombie.x - 23, zombie.y - 5, 5, 16, zombie.face);
      pixelRect(zombie.x - 26, zombie.y + 9, 5, 5, "#d9dfd2");
      pixelRect(zombie.x + 12, zombie.y - 2, 5, 18, zombie.face);
      pixelRect(zombie.x + 16, zombie.y + 14, 5, 5, "#d9dfd2");
      pixelRect(zombie.x - 10, zombie.y + 19, 6, 14, "#191719");
      pixelRect(zombie.x + 2, zombie.y + 18, 7, 15, "#191719");
      pixelRect(zombie.x - 13, zombie.y + 31, 8, 4, "#0e0d0d");
      pixelRect(zombie.x + 3, zombie.y + 31, 9, 4, "#0e0d0d");
      pixelRect(zombie.x - 3, zombie.y + 3, 5, 4, "#6d2029");
      pixelRect(zombie.x + 6, zombie.y + 10, 4, 3, "#d9dfd2");

      const barWidth = zombie.radius * 2;
      pixelRect(zombie.x - zombie.radius, zombie.y - 34, barWidth, 4, "#241b1b");
      pixelRect(zombie.x - zombie.radius, zombie.y - 34, barWidth * Math.max(0, zombie.health / zombie.maxHealth), 4, "#f04f4f");
    }

    function drawPickup(pickup) {
      pixelRect(pickup.x - 8, pickup.y - 8, 16, 16, "#5bffb8");
      pixelRect(pickup.x - 3, pickup.y - 10, 6, 20, "#142820");
      pixelRect(pickup.x - 10, pickup.y - 3, 20, 6, "#142820");
    }

    function drawTargetLock(target) {
      if (!target) return;
      const x = target.x;
      const y = target.y;
      const r = target.radius + 11;
      pixelRect(x - r, y - r, 12, 3, "#f2c14e");
      pixelRect(x - r, y - r, 3, 12, "#f2c14e");
      pixelRect(x + r - 12, y - r, 12, 3, "#f2c14e");
      pixelRect(x + r - 3, y - r, 3, 12, "#f2c14e");
      pixelRect(x - r, y + r - 3, 12, 3, "#f2c14e");
      pixelRect(x - r, y + r - 12, 3, 12, "#f2c14e");
      pixelRect(x + r - 12, y + r - 3, 12, 3, "#f2c14e");
      pixelRect(x + r - 3, y + r - 12, 3, 12, "#f2c14e");
    }

    function draw() {
      drawBackground();

      state.pickups.forEach(drawPickup);
      state.bullets.forEach((bullet) => {
        if (bullet.weapon === "mic") {
          pixelRect(bullet.x - 6, bullet.y - 9, 4, 18, bullet.color);
          pixelRect(bullet.x - 1, bullet.y - 12, 4, 24, "rgba(240, 79, 79, 0.85)");
          pixelRect(bullet.x + 5, bullet.y - 7, 8, 4, bullet.color);
          pixelRect(bullet.x + 5, bullet.y + 3, 8, 4, bullet.color);
        } else {
          pixelRect(bullet.x - 6, bullet.y - 3, 12, 6, bullet.color);
          pixelRect(bullet.x - 10, bullet.y - 7, 4, 14, "rgba(216, 210, 189, 0.8)");
          pixelRect(bullet.x + 7, bullet.y - 7, 4, 14, "rgba(216, 210, 189, 0.8)");
        }
      });
      state.zombies.forEach(drawZombie);
      if (state.running && state.player && !mouse.down) drawTargetLock(nearestZombie());

      if (state.player) {
        const blink = state.player.invulnerable > 0 && Math.floor(performance.now() / 70) % 2 === 0;
        drawHeroSprite(state.player.x, state.player.y, state.player.hero, state.player.aim, blink);
      } else {
        const hero = heroes[state.selectedHero];
        drawHeroSprite(canvas.width / 2, canvas.height / 2, hero, 0, false);
      }

      state.particles.forEach((particle) => {
        const alpha = Math.max(0, particle.life / particle.maxLife);
        ctx.globalAlpha = alpha;
        pixelRect(particle.x, particle.y, particle.size, particle.size, particle.color);
        ctx.globalAlpha = 1;
      });

      if (state.paused && state.running) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#f2c14e";
        ctx.font = "32px Courier New";
        ctx.textAlign = "center";
        ctx.fillText("PAUSE", canvas.width / 2, canvas.height / 2);
      }
    }

    function frame(time) {
      const dt = Math.min(0.033, (time - state.lastTime) / 1000 || 0);
      state.lastTime = time;
      update(dt);
      draw();
      requestAnimationFrame(frame);
    }

    function makePreview(targetId, hero) {
      const preview = document.createElement("canvas");
      preview.width = 72;
      preview.height = 72;
      const pctx = preview.getContext("2d");
      pctx.imageSmoothingEnabled = false;
      const rect = (x, y, w, h, color) => {
        pctx.fillStyle = color;
        pctx.fillRect(x, y, w, h);
      };
      pctx.fillStyle = "#141414";
      pctx.fillRect(0, 0, 72, 72);
      if (hero.outfit === "red") {
        rect(25, 6, 22, 8, "#070707");
        rect(23, 13, 26, 7, "#070707");
        rect(26, 13, 20, 17, hero.skin);
        rect(26, 20, 20, 5, "#070707");
        rect(32, 19, 3, 3, "#101010");
        rect(41, 19, 3, 3, "#101010");
        rect(32, 26, 9, 3, "#2a0810");
        rect(27, 31, 18, 6, hero.color);
        rect(25, 37, 22, 6, hero.color);
        rect(27, 43, 18, 8, hero.color);
        rect(30, 37, 12, 14, "#f1a0a0");
        rect(20, 34, 5, 9, hero.color);
        rect(17, 43, 4, 9, hero.color);
        rect(47, 34, 5, 9, hero.color);
        rect(51, 43, 4, 9, hero.color);
        rect(28, 52, 16, 4, "#111111");
        rect(25, 56, 6, 10, "#111111");
        rect(41, 56, 6, 10, "#111111");
        rect(23, 66, 5, 6, "#111111");
        rect(44, 66, 5, 6, "#111111");
      } else {
        rect(19, 14, 5, 29, hero.hair);
        rect(48, 14, 5, 32, hero.hair);
        rect(22, 21, 4, 37, "#0b0b0b");
        rect(46, 21, 4, 39, "#0b0b0b");
        rect(23, 6, 26, 9, hero.hair);
        rect(21, 14, 30, 8, hero.hair);
        rect(26, 13, 20, 17, hero.skin);
        rect(28, 16, 8, 7, "#050505");
        rect(38, 16, 8, 7, "#050505");
        rect(36, 18, 2, 2, "#050505");
        rect(30, 23, 13, 8, "#3b241c");
        rect(32, 25, 9, 4, "#5a3528");
        rect(26, 31, 20, 7, hero.color);
        rect(25, 38, 22, 7, hero.color);
        rect(28, 45, 17, 11, hero.color);
        rect(36, 31, 9, 27, "#eee8dd");
        rect(41, 42, 6, 17, "#fffaf0");
        rect(19, 34, 5, 10, hero.color);
        rect(16, 44, 4, 10, hero.color);
        rect(48, 34, 5, 10, hero.color);
        rect(52, 44, 4, 10, hero.color);
        rect(27, 56, 18, 4, "#111111");
        rect(24, 60, 6, 10, "#111111");
        rect(42, 60, 6, 10, "#111111");
      }
      if (hero.weapon === "mic") {
        rect(49, 33, 17, 5, "#191919");
        rect(62, 29, 8, 11, "#d8d2bd");
        rect(64, 31, 4, 7, "#4a4a4a");
      } else {
        rect(46, 28, 24, 15, "#121212");
        rect(49, 31, 18, 9, "#e8e1d4");
        for (let x = 51; x < 66; x += 4) {
          rect(x, 32, 2, 7, "#151515");
        }
      }
      document.querySelector(targetId).replaceChildren(preview);
    }

    heroButtons.forEach((button) => {
      button.addEventListener("click", () => selectHero(button.dataset.hero));
    });

    startBtn.addEventListener("click", () => {
      menuTitle.textContent = "Choisis ton survivant";
      resetGame();
      startMusic();
    });

    restartBtn.addEventListener("click", () => {
      menuTitle.textContent = "Choisis ton survivant";
      resetGame();
      startMusic();
    });

    musicBtn.addEventListener("click", () => {
      musicEnabled = !musicEnabled;
      updateMusicButton();
      if (musicEnabled) {
        startMusic();
      } else {
        music.pause();
      }
    });

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (event.code === "Space" || [" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(key)) {
        event.preventDefault();
      }
      if (key === "p" && state.running) state.paused = !state.paused;
      if (key === " ") shoot();
      keys.add(key);
    }, { capture: true });

    window.addEventListener("keyup", (event) => {
      if (event.code === "Space") event.preventDefault();
      keys.delete(event.key.toLowerCase());
    }, { capture: true });

    canvas.addEventListener("mousemove", (event) => {
      Object.assign(mouse, canvasPoint(event));
    });

    canvas.addEventListener("mousedown", (event) => {
      Object.assign(mouse, canvasPoint(event));
      mouse.down = true;
      shoot();
    });

    window.addEventListener("mouseup", () => {
      mouse.down = false;
    });

    canvas.addEventListener("touchstart", (event) => {
      const touch = event.touches[0];
      if (!touch) return;
      Object.assign(mouse, canvasPoint(touch));
      mouse.down = true;
      shoot();
      event.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchmove", (event) => {
      const touch = event.touches[0];
      if (!touch) return;
      Object.assign(mouse, canvasPoint(touch));
      event.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchend", () => {
      mouse.down = false;
    });

    function setStickPosition(clientX, clientY) {
      const rect = stick.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const max = rect.width * 0.34;
      const rawX = clientX - centerX;
      const rawY = clientY - centerY;
      const distance = Math.hypot(rawX, rawY);
      const scale = distance > max ? max / distance : 1;
      const x = rawX * scale;
      const y = rawY * scale;
      touchMove.x = x / max;
      touchMove.y = y / max;
      stickKnob.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
    }

    function resetStick() {
      touchMove.id = null;
      touchMove.x = 0;
      touchMove.y = 0;
      stickKnob.style.transform = "translate(-50%, -50%)";
    }

    stick.addEventListener("pointerdown", (event) => {
      touchMove.id = event.pointerId;
      stick.setPointerCapture(event.pointerId);
      setStickPosition(event.clientX, event.clientY);
      event.preventDefault();
    });

    stick.addEventListener("pointermove", (event) => {
      if (touchMove.id !== event.pointerId) return;
      setStickPosition(event.clientX, event.clientY);
      event.preventDefault();
    });

    stick.addEventListener("pointerup", (event) => {
      if (touchMove.id === event.pointerId) resetStick();
      event.preventDefault();
    });

    stick.addEventListener("pointercancel", (event) => {
      if (touchMove.id === event.pointerId) resetStick();
    });

    fireTouch.addEventListener("pointerdown", (event) => {
      touchFire.down = true;
      fireTouch.setPointerCapture(event.pointerId);
      shoot();
      event.preventDefault();
    });

    fireTouch.addEventListener("pointerup", (event) => {
      touchFire.down = false;
      event.preventDefault();
    });

    fireTouch.addEventListener("pointercancel", () => {
      touchFire.down = false;
    });

    makePreview("#brickPreview", heroes.brick);
    makePreview("#novaPreview", heroes.nova);
    updateHud();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
